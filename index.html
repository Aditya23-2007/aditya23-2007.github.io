<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aditya Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            text-align: center;
            transition: background 0.5s, color 0.5s;
        }
        header {
            background-color: rgba(0,0,0,0.6);
            padding: 20px;
        }
        h1 {
            font-size: 3em;
            margin: 0;
            color: #ffcc00;
            text-shadow: 2px 2px 5px #000;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            text-decoration: none;
            color: #fff;
            background: #ff6600;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            transition: 0.3s;
        }
        nav a:hover {
            background: #ffcc00;
            color: #000;
        }
        main {
            padding: 20px;
        }
        .projects {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .card {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
            width: 250px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card h3 {
            color: #ffcc00;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff6600;
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #ffcc00;
            color: #000;
        }
        footer {
            background-color: rgba(0,0,0,0.6);
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 0.9em;
        }
        /* Dark mode */
        .dark {
            background: #111;
            color: #eee;
        }
        .dark nav a {
            background: #444;
        }
        .dark nav a:hover {
            background: #888;
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Aditya Games</h1>
        <p>This is the official developer website.</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <main>
        <h2>My Projects</h2>
        <div class="projects" id="projectList">
            <!-- Cards will be injected here -->
        </div>
        <button onclick="toggleTheme()">Toggle Theme</button>
    </main>

    <footer>
        &copy; 2026 Aditya Games | Designed by Aditya
    </footer>

    <script>
        // Sample project data
        const projects = [
            { title: "Space Shooter", desc: "A fast-paced arcade game." },
            { title: "Puzzle Quest", desc: "Solve tricky puzzles and escape." },
            { title: "Racing Mania", desc: "High-speed racing adventure." }
        ];

        // Inject project cards dynamically
        const projectList = document.getElementById("projectList");
        projects.forEach(p => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<h3>${p.title}</h3><p>${p.desc}</p>`;
            projectList.appendChild(card);
        });

        // Theme toggle
        function toggleTheme() {
            document.body.classList.toggle("dark");
        }
    </script>
</body>
</html>
