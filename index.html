<!DOCTYPE html>
<html>
<head>
    <title>Aditya Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            text-align: center;
        }
        header {
            background-color: rgba(0,0,0,0.6);
            padding: 20px;
        }
        h1 {
            font-size: 3em;
            margin: 0;
            color: #ffcc00;
            text-shadow: 2px 2px 5px #000;
        }
        p {
            font-size: 1.2em;
            margin: 10px 0;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            text-decoration: none;
            color: #fff;
            background: #ff6600;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            transition: 0.3s;
        }
        nav a:hover {
            background: #ffcc00;
            color: #000;
        }
        footer {
            background-color: rgba(0,0,0,0.6);
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Aditya Games</h1>
        <p>This is the official developer website.</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <main>
        <p>Explore my latest game projects, coding experiments, and creative ideas. Stay tuned for updates!</p>
    </main>

    <footer>
        &copy; 2026 Aditya Games | Designed by Aditya
    </footer>
</body>
</html>
